experiment:
  name: debug_qbypass
  output_dir: outputs

data:
  dataset_name: wikitext
  dataset_config: wikitext-2-raw-v1
  tokenizer_name: gpt2
  block_size: 128
  batch_size: 8
  eval_batch_size: 8
  num_workers: 2

model:
  n_layer: 4
  n_head: 4
  d_model: 256
  dropout: 0.1
  bias: false
  attention_type: interference_bypass
  amplitude_activation: softplus
  phase_bound: pi_tanh
  disable_phase: false

train:
  seed: 42
  epochs: 20
  max_steps: 400
  lr: 0.0003
  min_lr: 0.00003
  weight_decay: 0.1
  betas: [0.9, 0.95]
  warmup_steps: 50
  grad_clip: 1.0
  grad_accum_steps: 1
  eval_interval: 50
  log_interval: 10
  save_interval: 100
  mixed_precision: true
  compile: false
  detect_anomaly: false

eval:
  max_eval_batches: 50

generation:
  max_new_tokens: 80
  temperature: 0.9
  top_k: 50
