experiment:
  name: main_qbypass_matched_d
  output_dir: outputs

data:
  dataset_name: wikitext
  dataset_config: wikitext-103-raw-v1
  tokenizer_name: gpt2
  block_size: 512
  batch_size: 8
  eval_batch_size: 8
  num_workers: 4

model:
  n_layer: 12
  n_head: 12
  d_model: 720
  dropout: 0.0
  bias: false
  attention_type: interference_bypass
  amplitude_activation: softplus
  phase_bound: learned_half_pi_tanh
  disable_phase: false

train:
  seed: 42
  epochs: 10
  max_steps: 20000
  lr: 0.00030
  min_lr: 0.00003
  weight_decay: 0.1
  betas: [0.9, 0.95]
  warmup_steps: 1000
  grad_clip: 1.0
  grad_accum_steps: 4
  eval_interval: 500
  log_interval: 20
  save_interval: 1000
  mixed_precision: true
  compile: false
  detect_anomaly: false

eval:
  max_eval_batches: 200

generation:
  max_new_tokens: 120
  temperature: 0.8
  top_k: 50